modLoader = "kotlinforforge"
loaderVersion = "[5,)"
license = "MIT"
issueTrackerURL = "https://github.com/dragon-cubed/dragon-cubed/issues"

[[mods]]
    modId        = "d3_rumble"
    version      = "${file.jarVersion}"
    displayName  = "D3-Rumble"
    description  = "Baritone compatibility extension for D3-Leylines. Translates Leyline commands into direct Baritone API calls."

